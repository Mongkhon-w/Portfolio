name: Portfolio CI/CD Pipeline

# กำหนดให้ Workflow ทำงานเมื่อมีการ Push โค้ดเข้าสาขา main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # =========================================
  # Job 1: ทดสอบการ Build (ป้องกันโค้ดพังขึ้น Production)
  # =========================================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # สร้างไฟล์ .env จำลองชั่วคราว เพื่อให้ Next.js Build ผ่าน
      - name: Create temporary .env for Build
        run: |
          echo "NEXT_PUBLIC_API_HOST=http://localhost:3001" > .env
          echo "MYSQL_DB=portfolio_db" >> .env
          echo "MYSQL_USER=testuser" >> .env
          echo "MYSQL_PASSWORD=testpass" >> .env

      - name: Test Docker Compose Build
        run: docker compose build

